targets:
  $default:
    builders:
      freezed:
        options:
          format: true
      json_serializable:
        options:
          field_rename: snake
          explicit_to_json: true
          include_if_null: false
      drift_dev:
        options:
          store_date_time_values_as_text: true
          named_parameters: true
          generate_connect_constructor: true
      riverpod_generator:
        options:
          use_deprecated_typedef: false
